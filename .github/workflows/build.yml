name: Build

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-24.04

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            autoconf automake libtool pkg-config \
            libmysqlclient-dev \
            liblua5.1-dev \
            libgmp-dev \
            libxml2-dev \
            libssl-dev \
            zlib1g-dev \
            libsqlite3-dev

      - name: Install Boost 1.90
        run: |
          wget -q https://archives.boost.io/release/1.90.0/source/boost_1_90_0.tar.gz
          tar xf boost_1_90_0.tar.gz
          cd boost_1_90_0
          ./bootstrap.sh --with-libraries=system,thread,regex,filesystem,date_time,chrono
          sudo ./b2 install -j$(nproc) --prefix=/usr/local
          sudo ldconfig

      - name: autogen
        run: bash autogen.sh

      - name: configure
        run: ./configure --enable-sqlite

      - name: Build
        run: make -j$(nproc)
