name: Build

on:
  workflow_dispatch:
  push:
    branches: [master]
    tags: ['v*']
  pull_request:
    branches: [master]

env:
  CMAKE_BUILD_PARALLEL_LEVEL: 4
  VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"

jobs:
  linux:
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - name: Export GitHub Actions cache env vars
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      - name: Install deps
        run: sudo apt-get update && sudo apt-get install -y ninja-build

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11

      - name: Restore sccache
        id: sccache-linux
        uses: actions/cache/restore@v4
        with:
          path: ~/.sccache
          key: sccache-linux-${{ matrix.arch }}-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sccache-linux-${{ matrix.arch }}-${{ github.ref_name }}-
            sccache-linux-${{ matrix.arch }}-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Configure sccache
        run: |
          echo "SCCACHE_DIR=$HOME/.sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Restore configure cache
        id: cmake-cache
        uses: actions/cache/restore@v4
        with:
          path: build/linux-release/
          key: linux-${{ matrix.arch }}-cmake-${{ hashFiles('CMakeLists.txt', 'vcpkg.json', 'CMakePresets.json', '.github/workflows/build.yml') }}
          restore-keys: |
            linux-${{ matrix.arch }}-cmake-

      - name: Configure
        if: steps.cmake-cache.outputs.cache-hit != 'true'
        run: |
          cmake --preset linux-release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Save configure cache
        if: steps.cmake-cache.outputs.cache-hit != 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: build/linux-release/
          key: linux-${{ matrix.arch }}-cmake-${{ hashFiles('CMakeLists.txt', 'vcpkg.json', 'CMakePresets.json', '.github/workflows/build.yml') }}

      - name: Build
        run: cmake --build --preset linux-release

      - name: Save sccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.sccache
          key: sccache-linux-${{ matrix.arch }}-${{ github.ref_name }}-${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theforgottenloginserver-linux-${{ matrix.arch }}
          path: build/linux-release/theforgottenloginserver

  macos-arm64:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: brew install ninja boost zlib openssl

      - name: Restore sccache
        id: sccache-macos
        uses: actions/cache/restore@v4
        with:
          path: ~/.sccache
          key: sccache-macos-${{ github.ref_name }}-${{ github.sha }}
          restore-keys: |
            sccache-macos-${{ github.ref_name }}-
            sccache-macos-

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.6

      - name: Configure sccache
        run: |
          echo "SCCACHE_DIR=$HOME/.sccache" >> $GITHUB_ENV
          echo "CMAKE_C_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV
          echo "CMAKE_CXX_COMPILER_LAUNCHER=sccache" >> $GITHUB_ENV

      - name: Restore configure cache
        id: cmake-cache
        uses: actions/cache/restore@v4
        with:
          path: build/macos-release/
          key: cmake-macos-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', '.github/workflows/build.yml') }}
          restore-keys: |
            cmake-macos-${{ runner.os }}-${{ runner.arch }}-
            cmake-macos-${{ runner.os }}-

      - name: Configure
        if: steps.cmake-cache.outputs.cache-hit != 'true'
        run: |
          cmake --preset macos-release \
            -DCMAKE_C_COMPILER_LAUNCHER=sccache \
            -DCMAKE_CXX_COMPILER_LAUNCHER=sccache

      - name: Save configure cache
        if: steps.cmake-cache.outputs.cache-hit != 'true' && always()
        uses: actions/cache/save@v4
        with:
          path: build/macos-release/
          key: cmake-macos-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('CMakeLists.txt', 'CMakePresets.json', '.github/workflows/build.yml') }}

      - name: Build
        run: cmake --build --preset macos-release

      - name: Save sccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.sccache
          key: sccache-macos-${{ github.ref_name }}-${{ github.sha }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: theforgottenloginserver-macos-arm64
          path: build/macos-release/theforgottenloginserver

  docker:
    needs: linux
    if: github.event_name == 'push'
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Download Linux amd64 binary
        uses: actions/download-artifact@v4
        with:
          name: theforgottenloginserver-linux-amd64
          path: artifact-amd64/

      - name: Download Linux arm64 binary
        uses: actions/download-artifact@v4
        with:
          name: theforgottenloginserver-linux-arm64
          path: artifact-arm64/

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/codefatherllc/wypas-auth-legacy
          tags: |
            type=sha
            type=semver,pattern={{version}}
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' || github.event_name == 'workflow_dispatch' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.ci
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger deploy
        uses: peter-evans/repository-dispatch@v3
        with:
          token: ${{ secrets.DEPLOY_TOKEN }}
          repository: codefatherllc/wypas-proxy
          event-type: component-release
          client-payload: '{"component": "wypas-auth-legacy", "tag": "${{ github.sha }}"}'

  release:
    needs: [linux, macos-arm64]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: theforgottenloginserver-*
          path: artifacts/

      - name: Prepare release assets
        run: |
          cd artifacts
          chmod +x theforgottenloginserver-linux-amd64/theforgottenloginserver
          chmod +x theforgottenloginserver-linux-arm64/theforgottenloginserver
          chmod +x theforgottenloginserver-macos-arm64/theforgottenloginserver
          tar -czf theforgottenloginserver-linux-amd64.tar.gz -C theforgottenloginserver-linux-amd64 theforgottenloginserver
          tar -czf theforgottenloginserver-linux-arm64.tar.gz -C theforgottenloginserver-linux-arm64 theforgottenloginserver
          tar -czf theforgottenloginserver-macos-arm64.tar.gz -C theforgottenloginserver-macos-arm64 theforgottenloginserver

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/theforgottenloginserver-linux-amd64.tar.gz
            artifacts/theforgottenloginserver-linux-arm64.tar.gz
            artifacts/theforgottenloginserver-macos-arm64.tar.gz
